version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - q_data:/app/data
    environment:
      - DATABASE_URL=file:./data/q.db
      - JWT_SECRET=${JWT_SECRET:-q-dev-secret-change-me}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_URL=http://chromadb:8000
      - PORT=3001
    depends_on:
      - chromadb

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - BACKEND_URL=http://backend:3001
      - Q_SECRET_KEY=${Q_SECRET_KEY:-sk_test_acme}
      - Q_SDK_KEY=${Q_SDK_KEY:-sdk_test_acme}
    depends_on:
      - backend

  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - '3002:3002'
    environment:
      - Q_BACKEND_URL=http://backend:3001
      - Q_SDK_KEY=${Q_SDK_KEY:-sdk_test_acme}
      - PROXY_PORT=3002
    depends_on:
      - backend

volumes:
  chroma_data:
  q_data:
